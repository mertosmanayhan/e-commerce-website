<div class="login-page">
  <div class="login-card">
    <div class="header" style="display: flex; align-items: center; margin-bottom: 20px;">
      <button routerLink="/login" class="back-btn" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #555; margin-right: 15px;">←</button>
      <h2 style="margin: 0;">Şifremi Sıfırla</h2>
    </div>

    <div class="success-alert" *ngIf="successMessage" style="background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 500;">
      {{ successMessage }}
      <p style="margin-top: 10px; font-size: 0.9rem;"><a routerLink="/login" style="color: #2e7d32; font-weight: bold;">Giriş sayfasına dön</a></p>
    </div>

    <form (ngSubmit)="resetPassword()" *ngIf="!successMessage">
      <div class="input-group">
        <label>Kayıtlı E-posta Adresiniz</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="ornek@posta.com" required>
      </div>

      <div class="input-group">
        <label>Yeni Şifreniz</label>
        <input type="password" name="newPassword" [(ngModel)]="newPassword" placeholder="******" required>
      </div>

      <div class="error-text" *ngIf="errorMessage" style="color: #d32f2f; margin-bottom: 15px; font-size: 0.9rem; font-weight: 500;">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-btn" [disabled]="loading" style="width: 100%; padding: 12px; background: #6200ea; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; transition: 0.2s;">
        <span *ngIf="!loading">Şifremi Yenile</span>
        <span *ngIf="loading">İşleniyor...</span>
      </button>
    </form>
  </div>
</div>
