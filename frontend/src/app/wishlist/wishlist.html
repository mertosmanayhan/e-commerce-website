<div class="store-container" style="padding: 40px 20px;">
  <div style="max-width: 1200px; margin: auto;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h2 style="color: #2c3e50; font-size: 28px; margin: 0;">❤️ Favorilerim</h2>
      <button routerLink="/products" style="padding: 10px 20px; background: white; border: 1px solid #dcdde1; border-radius: 8px; cursor: pointer; font-weight: bold;">← Alışverişe Dön</button>
    </div>

    <div *ngIf="favorites.length === 0" style="text-align: center; background: white; padding: 60px 20px; border-radius: 12px; border: 1px solid #eaeaea;">
      <div style="font-size: 60px; margin-bottom: 20px;">💔</div>
      <h3 style="color: #2c3e50;">Favori Listeniz Boş</h3>
      <p style="color: #888;">Hemen ürünleri inceleyin ve beğendiklerinizi kalp ikonuna tıklayarak buraya ekleyin.</p>
    </div>

    <div class="product-grid" *ngIf="favorites.length > 0">
      <div class="product-card" *ngFor="let product of favorites">

        <button class="wishlist-btn" (click)="removeFromWishlist(product)" style="border-color: #ff4757; color: #ff4757;">❌</button>

        <div style="width: 100%; height: 180px; overflow: hidden; border-radius: 12px 12px 0 0; background: #f0f0f0;">
          <img [src]="product.imageUrl" [alt]="product.name" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="card-content">
          <div class="product-info">
            <span class="category-tag">{{ product.category }}</span>
            <h3 class="product-name">{{ product.name }}</h3>
          </div>
          <div class="card-footer">
            <div class="product-price">${{ product.price }}</div>
            <div class="action-buttons">
              <button class="add-cart-btn" (click)="addToCart(product)">Sepete Ekle</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
